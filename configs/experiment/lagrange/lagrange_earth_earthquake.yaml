# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: earth
  - override /model: lagrange_amino
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["earth", "earthquake", "lagrange"]

seed: 12345

trainer:
  min_epochs: 50
  max_epochs: 300
  gradient_clip_val: null

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.001
  net:
    num_layers: 10
    d_model: 2048
    d_in: 3
  atol: 1e-7
  rtol: 1e-7
  in_shape:
    - 3
  manifold: sphere

callbacks:
  early_stopping:
    monitor: val/nll
    mode: min

data:
  batch_size: 8192
  dataset_file: earthquake

logger:
  wandb:
    tags: ${tags}
    group: "earth"
  aim:
    experiment: "earth"
