# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: amino_general
  - override /model: rfm
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["amino", "glycine", "rfm"]

seed: 12345

trainer:
  min_epochs: 800
  max_epochs: 10000
  gradient_clip_val: null

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.001
  net:
    num_layers: 10

callbacks:
  early_stopping:
    monitor: val/nll
    mode: min

data:
  batch_size: 4096
  data_type: Glycine

logger:
  wandb:
    tags: ${tags}
    group: "amino"
  aim:
    experiment: "amino"
