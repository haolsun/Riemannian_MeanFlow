# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: amino_general
  - override /model: meanflow_amino
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["amino", "amino_general", "meanflow"]

seed: 12345

trainer:
  min_epochs: 8000
  max_epochs: 10000
  gradient_clip_val: null

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.001
  prop_equal_times: 0.75
  epoch: 100
  my_method: "pcgrad"
  val_step: 8
  # alpha-p pcgrad alpha-f mf imf

callbacks:
  early_stopping:
    monitor: val/mmd-001
    mode: min

data:
  batch_size: 2048
  data_type: General

logger:
  wandb:
    tags: ${tags}
    group: "amino"
  aim:
    experiment: "amino"
