# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: earth
  - override /model: meanflow_amino
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["earth", "earthquake", "meanflow"]

seed: 12345

trainer:
  min_epochs: 100
  max_epochs: 700
  gradient_clip_val: null

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.001
  net:
    num_layers: 10
    d_model: 2048
    d_in: 3
  atol: 1e-7
  rtol: 1e-7
  in_shape:
    - 3
  prop_equal_times: 0.75
  manifold: sphere
  epoch: 100
  my_method: "pcgrad"
  val_step: 8
  # alpha-p pcgrad alpha-f mf imf

callbacks:
  early_stopping:
    monitor: val/mmd-001
    mode: min

data:
  batch_size: 8192
  dataset_file: earthquake

logger:
  wandb:
    tags: ${tags}
    group: "earth"
  aim:
    experiment: "earth"
