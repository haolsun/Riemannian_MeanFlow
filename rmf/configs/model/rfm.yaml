_target_: gfm.models.RFMModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.0

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: ${trainer.max_epochs}
  eta_min: 1e-6

net:
  _target_: gfm.models.arch.rfm.TMLP
  d_model: 512
  num_layers: 4
  actfn: swish
  d_in: 9

in_shape:
  - 9

compile: false
manifold: so3
so3_plot: True
