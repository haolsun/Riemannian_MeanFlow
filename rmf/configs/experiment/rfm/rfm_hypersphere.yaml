# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: earth
  - override /model: rfm
  - override /callbacks: default
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["earth", "hyper", "rfm"]

seed: 12345

trainer:
  min_epochs: 100
  max_epochs: 700
  gradient_clip_val: null

model:
  optimizer:
    lr: 1e-4
    weight_decay: 0.001
  net:
    num_layers: 4
    d_model: 512
    d_in: 128
  atol: 1e-7
  rtol: 1e-7
  in_shape:
    - 128
  manifold: sphere
  my_method: "mf"

callbacks:
  early_stopping:
    monitor: val/mmd-001
    mode: min

data:
  batch_size: 2048
  dataset_file: hyper

logger:
  wandb:
    tags: ${tags}
    group: "earth"
  aim:
    experiment: "earth"
